server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # All routes go to index.html (React Router handles routing client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }
}
