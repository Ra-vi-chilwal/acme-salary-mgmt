services:
  - type: web
    name: acme-salary-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/salary.sqlite
    disk:
      name: salary-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: acme-salary-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://acme-salary-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
